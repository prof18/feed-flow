name: Microsoft Store Diagnostics

on:
  workflow_dispatch:
    inputs:
      try_create:
        description: "Also probe the create-submission endpoint (creates and immediately deletes a draft)"
        type: boolean
        default: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Run Store submission diagnostics
        shell: pwsh
        env:
          MS_STORE_TENANT_ID: ${{ secrets.MS_STORE_TENANT_ID }}
          MS_STORE_CLIENT_ID: ${{ secrets.MS_STORE_CLIENT_ID }}
          MS_STORE_CLIENT_SECRET: ${{ secrets.MS_STORE_CLIENT_SECRET }}
          MS_STORE_APP_ID: ${{ secrets.MS_STORE_APP_ID }}
          TRY_CREATE: ${{ inputs.try_create }}
        run: |
          $tryCreate = $env:TRY_CREATE -eq 'true'
          .github/scripts/diagnose-store-submission.ps1 `
            -TenantId $env:MS_STORE_TENANT_ID `
            -ClientId $env:MS_STORE_CLIENT_ID `
            -ClientSecret $env:MS_STORE_CLIENT_SECRET `
            -ApplicationId $env:MS_STORE_APP_ID `
            -TryCreate:$tryCreate
