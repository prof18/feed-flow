# Screenshot copy source for store assets.
# Recommended Weblate setup:
# - file mask: assets/screenshotcopy/*/screenshot_copy.yml
# - monolingual base language file: assets/screenshotcopy/base/screenshot_copy.yml
# - file format: YAML file
#
# Keys intentionally mirror the Figma variable structure:
# screenshot_copy_<platform>_<slot>_<field>

