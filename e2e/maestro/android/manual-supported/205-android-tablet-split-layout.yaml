appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- extendedWaitUntil:
    visible: "E2E seed complete"
    timeout: 10000
- tapOn:
    id: e2e_open_app
- extendedWaitUntil:
    visible:
      id: drawer_timeline
    timeout: 10000
- assertVisible:
    text: "E2E Newest Unread Article.*"
- assertVisible:
    id: drawer_read
- tapOn:
    id: drawer_read
- assertVisible:
    text: "E2E Read Article.*"
- assertVisible:
    id: drawer_bookmarks
- tapOn:
    id: drawer_bookmarks
- assertVisible:
    text: "E2E Bookmarked Unread Article.*"
- assertVisible:
    id: drawer_timeline
- tapOn:
    id: drawer_timeline
- assertVisible:
    text: "E2E Newest Unread Article.*"
