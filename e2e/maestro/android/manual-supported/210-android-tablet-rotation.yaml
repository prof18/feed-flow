appId: com.prof18.feedflow.debug
---
- launchApp
- setOrientation: PORTRAIT
- openLink: feedflow://e2e/reset-and-seed?profile=reader-mode
- extendedWaitUntil:
    visible: "E2E seed complete"
    timeout: 10000
- tapOn:
    id: e2e_open_app
- extendedWaitUntil:
    visible:
      id: drawer_timeline
    timeout: 10000
- assertVisible:
    text: "E2E Newest Unread Article.*"
- tapOn:
    id: drawer_settings_button
- assertVisible: "Settings"
- assertVisible:
    id: settings_feeds_accounts
- assertVisible:
    id: settings_appearance
- pressKey: Back
- extendedWaitUntil:
    visible:
      id: drawer_timeline
    timeout: 10000
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_reader_success
    direction: DOWN
    timeout: 10000
- tapOn:
    id: article_row_e2e_article_reader_success
- assertVisible:
    id: reader_article_e2e_article_reader_success
- setOrientation: LANDSCAPE_LEFT
- assertVisible:
    id: reader_article_e2e_article_reader_success
- setOrientation: PORTRAIT
- assertVisible:
    id: reader_article_e2e_article_reader_success
