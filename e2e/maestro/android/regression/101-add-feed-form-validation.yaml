appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=empty
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- assertVisible: "Nothing else to read here!"
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feeds_accounts
- tapOn:
    text: "Add feed"
- assertVisible:
    id: add_feed_url_input
- assertVisible:
    id: add_feed_save_button
    enabled: false
- tapOn:
    id: add_feed_url_input
- inputText: "https://e2e.feedflow.local/feed.xml"
- assertVisible:
    id: add_feed_save_button
    enabled: true
- tapOn:
    id: edit_feed_category_selector
- assertVisible:
    text: "Categories"
