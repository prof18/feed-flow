appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=empty
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- assertVisible: "Nothing else to read here!"
- tapOn:
    text: "Open another feed"
- tapOn:
    id: feed_suggestions_add_options_button
- tapOn:
    text: "Feed Suggestions"
- assertVisible:
    id: feed_suggestions_screen
- tapOn:
    id: feed_suggestions_category_business
- assertVisible:
    id: feed_suggestions_row_https___feeds2_feedburner_com_businessinsider
- assertVisible:
    id: feed_suggestions_add_https___feeds2_feedburner_com_businessinsider
- tapOn:
    id: feed_suggestions_add_https___feeds2_feedburner_com_businessinsider
- extendedWaitUntil:
    visible:
      text: "Added"
    timeout: 5000
- assertVisible:
    id: feed_suggestions_add_https___feeds2_feedburner_com_businessinsider
