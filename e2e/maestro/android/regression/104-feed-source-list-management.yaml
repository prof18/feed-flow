appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feeds_accounts
- tapOn:
    id: feed_source_list_settings_row
- assertVisible:
    id: feed_source_list_screen
- tapOn:
    id: feed_source_list_category_e2e_category_technology
- assertVisible:
    id: feed_source_list_row_e2e_feed_android_weekly
- tapOn:
    id: feed_source_list_category_e2e_category_technology
- assertNotVisible:
    id: feed_source_list_row_e2e_feed_android_weekly
- tapOn:
    id: feed_source_list_category_e2e_category_technology
- assertVisible:
    id: feed_source_list_row_e2e_feed_android_weekly
- longPressOn:
    id: feed_source_list_row_e2e_feed_android_weekly
- tapOn:
    text: "Rename"
- tapOn:
    id: feed_source_list_rename_input_e2e_feed_android_weekly
- eraseText: 100
- inputText: E2E Renamed Source
- hideKeyboard
- tapOn:
    id: feed_source_list_rename_save_e2e_feed_android_weekly
- assertVisible:
    text: "E2E Renamed Source.*"
- longPressOn:
    id: feed_source_list_row_e2e_feed_android_weekly
- tapOn:
    text: "Delete"
- tapOn:
    text: "Delete feed"
- assertNotVisible:
    text: "E2E Renamed Source.*"
- scrollUntilVisible:
    element:
      id: feed_source_list_category_e2e_category_news
    direction: DOWN
- tapOn:
    id: feed_source_list_category_e2e_category_news
- assertVisible:
    id: feed_source_list_warning_e2e_feed_fetch_failed
