appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=reader-mode
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_reader_fallback
    direction: DOWN
    timeout: 10000
- tapOn:
    id: article_row_e2e_article_reader_fallback
- assertVisible:
    id: reader_article_e2e_article_reader_fallback
- assertVisible:
    id: reader_browser_button
- tapOn:
    id: reader_more_menu_button
- tapOn:
    text: "Text Settings"
- assertVisible:
    id: reader_text_settings_sheet
