appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=external-browser
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- assertVisible:
    id: article_row_e2e_article_newest_unread
- assertVisible:
    id: article_row_e2e_article_bookmarked_unread
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_reader_success
    direction: DOWN
    timeout: 10000
- tapOn:
    id: article_row_e2e_article_reader_success
- assertVisible:
    id: reader_browser_button
- assertVisible:
    id: reader_article_e2e_article_reader_success
- tapOn:
    id: reader_back_button
- assertVisible:
    id: article_row_e2e_article_reader_success
