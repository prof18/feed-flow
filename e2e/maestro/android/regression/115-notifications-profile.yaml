appId: com.prof18.feedflow.debug
---
- launchApp:
    permissions:
      notifications: allow
- openLink: feedflow://e2e/reset-and-seed?profile=notifications
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feeds_accounts
- tapOn:
    text: "Notifications"
- assertVisible:
    text: "Notifications"
- assertVisible:
    text: "Every 30 minutes"
- assertVisible:
    text: "By feed"
- assertVisible:
    text: "Enable All Notifications"
- assertVisible:
    text: "Android Central RSS Feed"
- assertVisible:
    text: "Bloomberg Technology"
- assertVisible:
    text: "Ars Technica"
- tapOn:
    text: "Notification grouping"
- tapOn:
    text: "By category"
- assertVisible:
    text: "By category"
