appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=empty
- extendedWaitUntil:
    visible: "E2E seed complete"
    timeout: 10000
- tapOn:
    id: e2e_open_app
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feeds_accounts
- tapOn:
    id: settings_import_export
- tapOn:
    id: import_export_import_feeds
- tapOn:
    id: com.google.android.documentsui:id/sub_menu_list
    optional: true
- tapOn:
    id: com.google.android.documentsui:id/item_root
    containsDescendants:
      - text: "feedflow-e2e"
    optional: true
- extendedWaitUntil:
    visible: "No items"
    timeout: 5000
    optional: true
- tapOn:
    text: "Documents"
    optional: true
- tapOn:
    id: com.google.android.documentsui:id/sub_menu_list
    optional: true
- scrollUntilVisible:
    element:
      text: "feedflow-valid-opml-smoke\\.xml"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: "feedflow-valid-opml-smoke\\.xml"
- extendedWaitUntil:
    visible:
      id: import_export_feed_import_success
    timeout: 10000
- tapOn:
    id: import_export_done
- tapOn:
    id: import_export_import_articles
- tapOn:
    id: com.google.android.documentsui:id/sub_menu_list
    optional: true
- tapOn:
    id: com.google.android.documentsui:id/item_root
    containsDescendants:
      - text: "feedflow-e2e"
    optional: true
- extendedWaitUntil:
    visible: "No items"
    timeout: 5000
    optional: true
- tapOn:
    text: "Documents"
    optional: true
- tapOn:
    id: com.google.android.documentsui:id/sub_menu_list
    optional: true
- scrollUntilVisible:
    element:
      text: "feedflow-articles-smoke\\.csv"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: "feedflow-articles-smoke\\.csv"
- extendedWaitUntil:
    visible:
      id: import_export_article_import_success
    timeout: 10000
- tapOn:
    id: import_export_done
- back
- back
- back
- tapOn:
    id: drawer_timeline
- assertVisible: "E2E Imported CSV Unread Article"
- assertVisible: "E2E Imported CSV Bookmarked Unread Article"
- assertNotVisible: "E2E Imported CSV Read Article"
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_read
- assertVisible: "E2E Imported CSV Read Article"
- assertVisible: "E2E Imported CSV Bookmarked Read Article"
- assertNotVisible: "E2E Imported CSV Unread Article"
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_bookmarks
- assertVisible: "E2E Imported CSV Bookmarked Unread Article"
- assertVisible: "E2E Imported CSV Bookmarked Read Article"
- assertNotVisible: "E2E Imported CSV Read Article"
