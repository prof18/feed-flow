appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feed_list
- assertVisible: "Text scale"
- assertVisible: "Hide article date"
- tapOn: "Hide article date"
- assertVisible: "Hide unread indicator"
- tapOn: "Hide unread indicator"
- assertVisible: "Hide feed source"
- tapOn: "Hide feed source"
- assertVisible: "Hide title from article description"
- tapOn: "Hide title from article description"
- tapOn: "Description lines"
- tapOn: "No limit"
- assertVisible: "No limit"
- scrollUntilVisible:
    element: "Date format"
    direction: DOWN
    timeout: 10000
- tapOn: "Date format"
- tapOn: "Year-Month-Day"
- assertVisible: "Year-Month-Day"
- scrollUntilVisible:
    element: "Time format"
    direction: DOWN
    timeout: 10000
- tapOn: "Time format"
- tapOn: "12 hours"
- assertVisible: "12 hours"
- scrollUntilVisible:
    element: "Left swipe"
    direction: DOWN
    timeout: 10000
- tapOn: "Left swipe"
- tapOn: "Toggle read"
- assertVisible: "Toggle read"
- tapOn: "Right swipe"
- tapOn: "Toggle bookmark"
- assertVisible: "Toggle bookmark"
