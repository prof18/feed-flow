appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_sync_storage
- scrollUntilVisible:
    element: "Background sync only on Wi-Fi"
    direction: DOWN
    timeout: 10000
- tapOn: "Background sync only on Wi-Fi"
- assertVisible: "Background sync only while charging"
- tapOn: "Background sync only while charging"
- scrollUntilVisible:
    element:
      id: sync_storage_clear_downloaded
    direction: DOWN
    timeout: 10000
- tapOn:
    id: sync_storage_clear_downloaded
- assertVisible: "Clear downloaded articles?"
- tapOn: "Confirm"
- scrollUntilVisible:
    element: "Clear image cache"
    direction: DOWN
    timeout: 10000
- tapOn: "Clear image cache"
- assertVisible: "Clear image cache?"
- tapOn: "Cancel"
