appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- scrollUntilVisible:
    element: "About & Support"
    direction: DOWN
    timeout: 10000
- tapOn: "About & Support"
- assertVisible: "Report issue"
- assertVisible: "Send anonymous crash reports"
- tapOn: "Send anonymous crash reports"
- assertVisible: "Send anonymous crash reports"
- tapOn: "Send anonymous crash reports"
- assertVisible: "About"
