appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=sync-upload-required&account=fresh_rss
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- assertVisible:
    text: "E2E Newest Unread Article.*"
- tapOn:
    id: home_more_menu_button
- assertVisible: "Upload changes"
- tapOn: "Upload changes"
- assertVisible:
    text: "E2E Newest Unread Article.*"
