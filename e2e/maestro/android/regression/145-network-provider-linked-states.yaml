appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=sync-linked-mock&account=miniflux
- extendedWaitUntil:
    visible:
      id: e2e_seed_complete
    timeout: 30000
- tapOn:
    id: e2e_open_app
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feeds_accounts
- tapOn:
    id: settings_accounts
- assertVisible:
    id: accounts_provider_miniflux
    enabled: true
- assertVisible:
    id: accounts_provider_fresh_rss
    enabled: false
- assertVisible:
    id: accounts_provider_bazqux
    enabled: false
- assertVisible:
    id: accounts_provider_feedbin
    enabled: false
- tapOn:
    id: accounts_provider_miniflux
- assertVisible: "Miniflux"
- assertVisible: "Your Miniflux account is successfully connected"
- assertVisible: "Last sync:.*"
- assertVisible: "Disconnect"
