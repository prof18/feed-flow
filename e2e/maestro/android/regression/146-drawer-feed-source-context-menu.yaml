appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- extendedWaitUntil:
    visible:
      id: e2e_seed_complete
    timeout: 15000
- tapOn:
    id: e2e_open_app
- tapOn:
    id: drawer_menu_button
- scrollUntilVisible:
    element:
      id: drawer_category_expand_e2e_category_technology
    direction: DOWN
    timeout: 10000
- tapOn:
    id: drawer_category_expand_e2e_category_technology
- scrollUntilVisible:
    element:
      id: drawer_feed_source_e2e_feed_android_weekly
    direction: DOWN
    timeout: 10000

# Open context menu and assert app-owned action set
- longPressOn:
    id: drawer_feed_source_e2e_feed_android_weekly
- assertVisible: "Mark all as read"
- assertVisible: "Open website"
- assertVisible: "Edit feed"
- assertVisible: "Change category"
- assertVisible: "Pin"
- assertVisible: "Delete"

# Pin: moves Android Weekly into the Pinned Feed Sources section
- tapOn: "Pin"
- assertVisible: "Pinned Feed Sources"
- assertVisible:
    id: drawer_feed_source_e2e_feed_android_weekly

# Unpin via long-press on the same source (Pinned section row)
- longPressOn:
    id: drawer_feed_source_e2e_feed_android_weekly
- assertVisible: "Unpin"
- tapOn: "Unpin"

# Confirm the menu now shows Pin again (the source is unpinned). Content-rich
# also seeds Ars Technica pinned, so the Pinned Feed Sources header stays visible.
- longPressOn:
    id: drawer_feed_source_e2e_feed_android_weekly
- assertVisible: "Pin"
- assertNotVisible: "Unpin"

# Change category opens the category selector sheet
- tapOn: "Change category"
- assertVisible: "Categories"
- back

# Mark all as read clears the unread count for this single feed
- scrollUntilVisible:
    element:
      id: drawer_feed_source_e2e_feed_android_weekly
    direction: DOWN
    timeout: 10000
- longPressOn:
    id: drawer_feed_source_e2e_feed_android_weekly
- tapOn: "Mark all as read"
- assertVisible:
    id: drawer_feed_source_e2e_feed_android_weekly

# Delete removes the feed source from the drawer
- longPressOn:
    id: drawer_feed_source_e2e_feed_android_weekly
- tapOn: "Delete"
- assertVisible: "Delete feed?"
- tapOn: "Delete feed"
- assertNotVisible:
    id: drawer_feed_source_e2e_feed_android_weekly
