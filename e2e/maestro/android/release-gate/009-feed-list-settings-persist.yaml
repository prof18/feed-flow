appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- assertVisible:
    id: article_image_e2e_article_newest_unread
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feed_list
- tapOn:
    id: feed_list_settings_layout
- tapOn:
    text: "Card"
- tapOn:
    id: feed_list_settings_hide_images
- scrollUntilVisible:
    element:
      id: feed_list_settings_order
    direction: DOWN
    timeout: 10000
- tapOn:
    id: feed_list_settings_order
- tapOn:
    text: "Oldest First"
- tapOn:
    id: settings_back_button
- tapOn:
    id: settings_back_button
- tapOn:
    id: drawer_timeline
    optional: true
- assertVisible:
    text: "E2E Old Article Eligible For Delete.*"
- assertNotVisible:
    id: article_image_e2e_article_old
- launchApp
- assertVisible:
    text: "E2E Old Article Eligible For Delete.*"
- assertNotVisible:
    id: article_image_e2e_article_old
