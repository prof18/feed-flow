appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_reader_success
    direction: DOWN
    timeout: 10000
- tapOn:
    id: article_row_e2e_article_reader_success
- assertVisible:
    id: reader_bookmark_button
- tapOn:
    id: reader_bookmark_button
- tapOn:
    id: reader_back_button
- launchApp
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_bookmarks
- scrollUntilVisible:
    element:
      text: "E2E Reader Mode Success Article.*"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_read
- scrollUntilVisible:
    element:
      text: "E2E Reader Mode Success Article.*"
    direction: DOWN
    timeout: 10000
