appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=reader-mode
- assertVisible: "E2E seed complete"
- tapOn:
    id: e2e_open_app
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_reader_success
    direction: DOWN
    timeout: 10000
- tapOn:
    id: article_row_e2e_article_reader_success
- assertVisible:
    id: reader_article_e2e_article_reader_success
- assertVisible:
    id: reader_browser_button
- tapOn:
    id: reader_next_button
- extendedWaitUntil:
    visible:
      id: reader_article_e2e_article_reader_fallback
    timeout: 5000
- tapOn:
    id: reader_bookmark_button
- tapOn:
    id: reader_more_menu_button
- tapOn:
    text: "Font Size"
- assertVisible:
    text: "Font Size"
