appId: com.prof18.feedflow.debug
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- extendedWaitUntil:
    visible: "E2E seed complete"
    timeout: 10000
- tapOn:
    id: e2e_open_app
- tapOn:
    id: drawer_menu_button
- scrollUntilVisible:
    element:
      id: drawer_category_expand_e2e_category_technology
    direction: DOWN
    timeout: 10000
- tapOn:
    id: drawer_category_expand_e2e_category_technology
- scrollUntilVisible:
    element:
      id: drawer_feed_source_e2e_feed_android_weekly
    direction: DOWN
    timeout: 10000
- longPressOn:
    id: drawer_feed_source_e2e_feed_android_weekly
- tapOn: "Edit feed"
- tapOn:
    id: edit_feed_name
- eraseText: 100
- inputText: E2E Renamed Android Feed
- hideKeyboard
- tapOn:
    id: edit_feed_hidden_toggle
- tapOn:
    id: edit_feed_pinned_toggle
- scrollUntilVisible:
    element:
      id: edit_feed_category_selector
    direction: DOWN
- tapOn:
    id: edit_feed_category_selector
- tapOn:
    text: "News"
- tapOn:
    text: "Save"
- tapOn:
    id: edit_feed_save
- tapOn:
    id: drawer_menu_button
    optional: true
- assertVisible: "E2E Renamed Android Feed.*"
- tapOn:
    id: drawer_timeline
    optional: true
- assertNotVisible: "E2E Newest Unread Article: Motorola Razr deals"
