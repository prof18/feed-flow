appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- assertVisible:
    text: "E2E Newest Unread Article.*"
- tapOn:
    text: "Show Sidebar"
    optional: true
- extendedWaitUntil:
    visible:
      id: drawer_timeline
    timeout: 10000
- assertVisible:
    id: drawer_read
- tapOn:
    id: drawer_read
- assertVisible:
    text: "E2E Read Article.*"
- assertVisible:
    id: drawer_bookmarks
- tapOn:
    id: drawer_bookmarks
- assertVisible:
    text: "E2E Bookmarked Unread Article.*"
- assertVisible:
    id: drawer_timeline
