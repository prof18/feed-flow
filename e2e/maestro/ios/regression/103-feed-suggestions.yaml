appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=empty
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- assertVisible: "Nothing else to read here!"
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: feed_suggestions_menu_button
- tapOn:
    id: feed_suggestions_drawer_item
- assertVisible:
    id: feed_suggestions_screen
- tapOn:
    id: feed_suggestions_category_business
- assertVisible:
    id: feed_suggestions_row_https___feeds2_feedburner_com_businessinsider
- tapOn:
    text: "Add"
- extendedWaitUntil:
    visible:
      text: "Added"
    timeout: 5000
