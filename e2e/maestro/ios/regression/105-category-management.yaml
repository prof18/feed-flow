appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- tapOn:
    id: drawer_menu_button
- longPressOn:
    id: drawer_category_e2e_category_technology
- tapOn:
    id: drawer_category_menu_rename
- tapOn:
    id: edit_feed_category_rename_input
- eraseText: 100
- inputText: "E2E Renamed Category"
- tapOn:
    id: edit_feed_category_rename_save
- assertVisible: "E2E Renamed Category"
- longPressOn:
    id: drawer_category_e2e_category_technology
- tapOn:
    id: drawer_category_menu_delete_all_feeds
- tapOn:
    text: "Confirm"
- assertNotVisible: "Android Central RSS Feed"
