appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=big-image-layout
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- assertVisible:
    text: "E2E Newest Unread Article.*"
- assertVisible:
    text: "A realistic seeded item using Android Central image metadata"
- assertVisible:
    text: "Android Central RSS Feed"
- assertVisible:
    id: article_image_e2e_article_newest_unread
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_no_image
    direction: DOWN
    timeout: 10000
- assertVisible:
    text: "E2E Article Without Image.*"
- assertVisible:
    text: "Seeded item without media"
