appId: com.prof18.feedflow.dev
---
- launchApp
- setOrientation: PORTRAIT
- openLink: feedflow://e2e/reset-and-seed?profile=grid-layout
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- setOrientation: LANDSCAPE_LEFT
- assertVisible:
    text: "E2E Newest Unread Article.*"
- assertVisible:
    id: article_image_e2e_article_newest_unread
- setOrientation: PORTRAIT
