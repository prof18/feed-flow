appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=oldest-first
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- assertVisible:
    id: article_row_e2e_article_old
- assertVisible:
    id: article_row_e2e_article_reader_success
- assertVisible:
    id: article_row_e2e_article_duplicate_title
- tapOn:
    id: home_more_menu_button
- tapOn:
    text: "Sort & filter"
- tapOn:
    text: "Oldest First"
- tapOn:
    text: "Newest First"
- tapOn:
    text: "Done"
- assertVisible:
    id: article_row_e2e_article_newest_unread
- openLink: feedflow://e2e/reset-and-seed?profile=oldest-first
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- assertVisible:
    id: article_row_e2e_article_old
- assertVisible:
    id: article_row_e2e_article_reader_success
- assertVisible:
    id: article_row_e2e_article_duplicate_title
- longPressOn:
    id: article_row_e2e_article_reader_success
- tapOn:
    text: "Mark all below as read"
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_read
- assertVisible:
    id: article_row_e2e_article_duplicate_title
- openLink: feedflow://e2e/reset-and-seed?profile=oldest-first
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- assertVisible:
    id: article_row_e2e_article_old
- assertVisible:
    id: article_row_e2e_article_reader_success
- assertVisible:
    id: article_row_e2e_article_duplicate_title
- longPressOn:
    id: article_row_e2e_article_reader_success
- tapOn:
    text: "Mark all above as read"
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_read
- assertVisible:
    id: article_row_e2e_article_old
