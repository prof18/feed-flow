appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=reader-mode
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_reader_success
    direction: DOWN
    timeout: 10000
- tapOn:
    id: article_row_e2e_article_reader_success
- assertVisible:
    text: "E2E Reader Mode Success[\\s\\S]*"
- assertVisible:
    id: reader_open_image_button
- tapOn:
    id: reader_open_image_button
- assertVisible:
    id: reader_image_viewer
- assertVisible:
    id: reader_image_viewer_close_button
- assertVisible:
    id: reader_image_viewer_share_button
- tapOn:
    id: reader_image_viewer_close_button
- assertVisible:
    id: reader_browser_button
