appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=external-browser
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- assertVisible:
    id: article_row_e2e_article_newest_unread
- assertVisible:
    id: article_row_e2e_article_bookmarked_unread
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_reader_success
    direction: DOWN
    timeout: 10000
- tapOn:
    id: article_row_e2e_article_reader_success
- assertVisible:
    id: reader_browser_button
- assertVisible:
    text: "E2E Reader Mode Success Article[\\s\\S]*"
- swipe:
    start: 2%,50%
    end: 90%,50%
    duration: 500
- assertVisible:
    id: article_row_e2e_article_reader_success
