appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- scrollUntilVisible:
    element:
      id: settings_sync_storage
    direction: DOWN
    timeout: 10000
- tapOn:
    id: settings_sync_storage
- assertVisible:
    id: sync_storage_refresh_on_launch
- assertVisible:
    id: sync_storage_show_rss_errors
- tapOn:
    id: sync_storage_refresh_on_launch
- tapOn:
    id: sync_storage_show_rss_errors
- tapOn:
    id: sync_storage_auto_delete
- tapOn: "One week old"
- tapOn:
    id: sync_storage_clear_downloaded
- assertVisible: "Clear downloaded articles?"
- tapOn: "Cancel"
