appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=empty
- tapOn:
    text: "^Open$"
    optional: true
- extendedWaitUntil:
    visible:
      id: e2e_seed_complete
    timeout: 10000
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feeds_accounts
- tapOn:
    id: settings_accounts
- tapOn:
    id: accounts_add_account
- assertVisible:
    id: accounts_provider_fresh_rss
- assertVisible:
    id: accounts_provider_miniflux
- assertVisible:
    id: accounts_provider_bazqux
- assertVisible:
    id: accounts_provider_feedbin
- tapOn:
    id: accounts_provider_fresh_rss
- assertVisible: "FreshRSS"
- assertVisible:
    id: account_connect_button
    enabled: false
- assertVisible:
    id: account_server_url_input
- assertVisible:
    id: account_username_input
- assertVisible:
    id: account_password_input
- assertVisible:
    id: account_password_visibility
- scrollUntilVisible:
    element:
      id: account_e2e_login_error
    direction: DOWN
- tapOn:
    id: account_e2e_login_error
- assertVisible: "The credentials are not correct. Please try again."
- tapOn:
    id: account_e2e_login_success
- extendedWaitUntil:
    visible:
      id: accounts_provider_fresh_rss
    timeout: 5000
- tapOn:
    id: accounts_provider_fresh_rss
- assertVisible:
    id: account_connected_message
- assertVisible:
    id: account_disconnect_button
