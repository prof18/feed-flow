appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=sync-linked-mock&account=dropbox
- tapOn:
    text: "^Open$"
    optional: true
- extendedWaitUntil:
    visible:
      id: e2e_seed_complete
    timeout: 10000
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feeds_accounts
- tapOn:
    id: settings_accounts
- assertVisible:
    id: accounts_provider_dropbox
- assertVisible:
    id: accounts_add_account
    enabled: false
- tapOn:
    id: accounts_provider_dropbox
- assertVisible: "Dropbox"
- assertVisible:
    id: account_connected_message
- assertVisible:
    id: account_last_sync_label
- assertVisible:
    id: account_disconnect_button
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=sync-linked-mock&account=google_drive
- tapOn:
    text: "^Open$"
    optional: true
- extendedWaitUntil:
    visible:
      id: e2e_seed_complete
    timeout: 10000
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feeds_accounts
- tapOn:
    id: settings_accounts
- assertVisible:
    id: accounts_provider_google_drive
- assertVisible:
    id: accounts_add_account
    enabled: false
- tapOn:
    id: accounts_provider_google_drive
- assertVisible: "Google Drive"
- assertVisible:
    id: account_connected_message
- assertVisible:
    id: account_last_sync_label
- assertVisible:
    id: account_disconnect_button
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=sync-linked-mock&account=icloud
- tapOn:
    text: "^Open$"
