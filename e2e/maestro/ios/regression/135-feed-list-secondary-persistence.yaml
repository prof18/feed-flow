appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feed_list
- scrollUntilVisible:
    element: "Description lines"
    direction: DOWN
    timeout: 10000
- tapOn: "Description lines"
- tapOn: "No limit"
- scrollUntilVisible:
    element: "Date format"
    direction: DOWN
    timeout: 10000
- tapOn: "Date format"
- tapOn: "Year-Month-Day"
- tapOn: "Time format"
- tapOn: "12 hours"
- scrollUntilVisible:
    element: "Left swipe"
    direction: DOWN
    timeout: 10000
- tapOn: "Left swipe"
- tapOn: "Toggle read"
- tapOn: "Right swipe"
- tapOn: "Toggle bookmark"
- tapOn:
    id: BackButton
- tapOn:
    id: settings_done_button
- tapOn:
    id: drawer_timeline
    optional: true
- launchApp
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feed_list
- scrollUntilVisible:
    element: "Description lines"
    direction: DOWN
    timeout: 10000
- assertVisible: "No limit"
- scrollUntilVisible:
    element: "Date format"
    direction: DOWN
    timeout: 10000
- assertVisible: "Year-Month-Day"
- assertVisible: "12 hours"
- scrollUntilVisible:
    element: "Left swipe"
    direction: DOWN
    timeout: 10000
- assertVisible: "Toggle read"
- assertVisible: "Toggle bookmark"
