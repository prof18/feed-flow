appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_comments
    direction: DOWN
    timeout: 10000
- longPressOn:
    id: article_row_e2e_article_comments
- assertVisible: "Open feed settings"
- assertVisible: "Open feed website"
- assertVisible: "Mark all above as read"
- assertVisible: "Mark all below as read"
- assertVisible: "Open comments"
- assertVisible: "Share comments"
- assertVisible: "Share"
- assertVisible: "Add to bookmarks"
- assertVisible: "Mark as read"
