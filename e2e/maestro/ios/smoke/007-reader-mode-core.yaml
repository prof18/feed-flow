appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=reader-mode
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_reader_success
    direction: DOWN
    timeout: 10000
- tapOn:
    id: article_row_e2e_article_reader_success
- assertVisible:
    text: "E2E Reader Mode Success[\\s\\S]*"
- assertVisible:
    id: reader_browser_button
- tapOn:
    id: reader_next_button
- extendedWaitUntil:
    visible:
      text: "E2E Reader Mode Fallback[\\s\\S]*"
    timeout: 5000
- tapOn:
    id: reader_more_menu_button
- tapOn:
    text: "Font Size"
- assertVisible:
    text: "Font Size"
