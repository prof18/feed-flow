appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=content-rich
- tapOn:
    text: "^Open$"
    optional: true
- assertVisible:
    id: e2e_seed_complete
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_reading_behavior
- tapOn:
    id: reading_behavior_reader_mode
    point: "90%,50%"
- tapOn:
    id: reading_behavior_reader_mode
    point: "90%,50%"
- tapOn:
    id: reading_behavior_show_read
    point: "90%,50%"
- scrollUntilVisible:
    element:
      text: "Auto-hide articles when marked as read"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: reading_behavior_hide_read
    point: "90%,50%"
- tapOn:
    id: BackButton
- tapOn:
    id: settings_done_button
- tapOn:
    id: drawer_timeline
    optional: true
- assertVisible:
    text: "E2E Read Article.*"
- launchApp
- assertVisible:
    text: "E2E Read Article.*"
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_reading_behavior
- tapOn:
    id: reading_behavior_show_read
    point: "90%,50%"
- tapOn:
    id: BackButton
- tapOn:
    id: settings_done_button
- tapOn:
    id: drawer_timeline
    optional: true
- assertNotVisible:
    text: "E2E Read Article.*"
- scrollUntilVisible:
    element:
      id: article_row_e2e_article_reader_success
    direction: DOWN
    timeout: 10000
- tapOn:
    id: article_row_e2e_article_reader_success
- assertVisible:
    id: reader_browser_button
- swipe:
    start: 2%,50%
    end: 90%,50%
    duration: 500
- extendedWaitUntil:
    notVisible:
      id: article_row_e2e_article_reader_success
    timeout: 10000
