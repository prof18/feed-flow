appId: com.prof18.feedflow.dev
---
- launchApp
- openLink: feedflow://e2e/reset-and-seed?profile=empty
- tapOn:
    text: "^Open$"
    optional: true
- extendedWaitUntil:
    visible:
      id: e2e_seed_complete
    timeout: 10000
- tapOn:
    id: drawer_menu_button
- tapOn:
    id: drawer_settings_button
- tapOn:
    id: settings_feeds_accounts
- tapOn:
    id: settings_import_export
- tapOn:
    id: import_export_import_feeds
- tapOn:
    text: "Search"
- tapOn:
    text: "Search"
    optional: true
- inputText: "feedflow-valid-opml-smoke"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    point: 18%,43%
- extendedWaitUntil:
    visible:
      id: import_export_feed_import_success
    timeout: 10000
- tapOn:
    id: import_export_done
- tapOn:
    id: settings_import_export
- tapOn:
    id: import_export_import_articles
- tapOn:
    text: "Search"
- tapOn:
    text: "Search"
    optional: true
- inputText: "feedflow-articles-smoke"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    point: 18%,43%
- extendedWaitUntil:
    visible:
      id: import_export_article_import_success
    timeout: 10000
- tapOn:
    id: import_export_done
    optional: true
